name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: j178/prek-action@v2
      - run: npm run typecheck
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: fimod-vscode-vsix
          path: "*.vsix"
          retention-days: 14
